<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>40Lello Food Contest</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 20px; text-align: center; }
        h1 { opacity: 0; animation: fadeIn 1s ease forwards 0.5s; font-size: 1.5rem; margin-bottom: 20px; color: var(--gold); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #2a2a2a; border-radius: 15px; padding: 10px; cursor: pointer; animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) both; position: relative; }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; }
        .card p { margin: 10px 0 5px; font-size: 0.9rem; }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 100% { transform: scale(1); } }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        .focus-card { width: 85%; max-width: 400px; background: #333; padding: 20px; border-radius: 20px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        .focus-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        
        .stars { margin: 20px 0; font-size: 2.5rem; }
        .star { color: #555; cursor: pointer; transition: 0.2s; padding: 0 5px; }
        .star.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        .voted-badge { position: absolute; top: 5px; right: 5px; background: var(--gold); color: black; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; display: none; font-weight: bold; }
        
        #area-invio { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        textarea { width: 90%; max-width: 400px; height: 80px; border-radius: 12px; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; font-family: inherit; margin-bottom: 15px; }
        textarea:focus { border-color: var(--gold); outline: none; }
        
        #btnInvia { padding: 15px 40px; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <h1>Vota i Piatti di 40Lello!</h1>

    <div class="grid">
        <div class="card" onclick="openVote(0)" style="animation-delay: 0.1s">
            <div class="voted-badge" id="badge0">OK</div>
            <img src="patate.jpeg">
            <p>Pasta e Patate</p>
        </div>
        <div class="card" onclick="openVote(1)" style="animation-delay: 0.2s">
            <div class="voted-badge" id="badge1">OK</div>
            <img src="frittata.jpeg">
            <p>Frittata</p>
        </div>
        <div class="card" onclick="openVote(2)" style="animation-delay: 0.3s">
            <div class="voted-badge" id="badge2">OK</div>
            <img src="insalata.jpeg">
            <p>Pasta all'insalata</p>
        </div>
        <div class="card" onclick="openVote(3)" style="animation-delay: 0.4s">
            <div class="voted-badge" id="badge3">OK</div>
            <img src="https://via.placeholder.com/300x200?text=In+Arrivo" id="img3">
            <p>Antipasto</p>
        </div>
    </div>

    <div id="area-invio">
        <textarea id="commento" placeholder="Lascia un commento (facoltativo)..."></textarea><br>
        <button id="btnInvia" onclick="inviaTutto()">INVIA IL TUO VOTO 🚀</button>
    </div>

    <div id="overlay">
        <div class="focus-card">
            <img src="" id="focusImg">
            <h2 id="focusTitle" style="margin-top:0"></h2>
            <div class="stars">
                <span class="star" onclick="setRating(1)">★</span>
                <span class="star" onclick="setRating(2)">★</span>
                <span class="star" onclick="setRating(3)">★</span>
                <span class="star" onclick="setRating(4)">★</span>
                <span class="star" onclick="setRating(5)">★</span>
            </div>
            <p style="color:#888; font-size:0.9rem">Tocca le stelle per votare</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "IL_TUO_URL_QUI"; // <--- METTI IL TUO URL DI GOOGLE QUI
        let piatti = ["Pasta e Patate", "Frittata", "Pasta all'insalata", "Antipasto"];
        let immagini = ["patate.jpeg", "frittata.jpeg", "insalata.jpeg", "https://via.placeholder.com/300x200?text=In+Arrivo"];
        let voti = [0, 0, 0, 0];
        let currentIdx = null;

        function openVote(idx) {
            currentIdx = idx;
            document.getElementById('focusImg').src = immagini[idx];
            document.getElementById('focusTitle').innerText = piatti[idx];
            document.getElementById('overlay').style.display = 'flex';
            updateStars(0);
        }

        function setRating(r) {
            voti[currentIdx] = r;
            updateStars(r);
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('badge' + currentIdx).style.display = 'block';
                checkComplete();
            }, 400);
        }

        function updateStars(r) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, i) => s.classList.toggle('active', i < r));
        }

        function checkComplete() {
            if (voti.every(v => v > 0)) {
                document.getElementById('area-invio').style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        function inviaTutto() {
            const btn = document.getElementById('btnInvia');
            btn.innerText = "Invio in corso...";
            btn.disabled = true;

            const payload = {
                voti: voti,
                commento: document.getElementById('commento').value || "Nessun commento"
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                document.body.innerHTML = "<div style='padding-top:100px;'><h1>🙏 Grazie mille!</h1><p>Il tuo voto è stato registrato.<br>Buon divertimento!</p></div>";
            }).catch(e => alert("Errore invio. Riprova!"));
        }
    </script>
</body>
</html>
